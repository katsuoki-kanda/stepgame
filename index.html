<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ステップ・マスター 60 - Professional Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
        }

        .container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }

        /* UIヘッダー */
        .ui-header {
            position: absolute; top: 15px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 50; pointer-events: none;
        }

        .info-box {
            background: rgba(0,0,0,0.85); padding: 8px 30px; border-radius: 12px;
            font-size: 28px; border: 2px solid; font-weight: bold; min-width: 250px; text-align: center;
        }
        #score-display { color: #00ffcc; border-color: #00ffcc; }
        #timer-display { color: #ff3366; border-color: #ff3366; }

        /* 問題表示（緑文字） */
        #command-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 20;
        }

        #command-text {
            font-size: min(35vh, 60vw);
            font-weight: 900;
            color: #00ff00;
            writing-mode: vertical-rl;
            text-orientation: upright;
            text-align: center;
            line-height: 1.0;
            text-shadow: 6px 6px 0px #000, -6px -6px 0px #000, 0 0 60px rgba(0,0,0,1);
        }

        /* オーバーレイ表示 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }
        .overlay.preview-mode { background: rgba(0,0,0,0.3); }

        .btn-start {
            padding: 20px 50px; font-size: 28px; background: #ff0000; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 25px rgba(255,0,0,0.6);
        }

        #status-msg {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,0,0.85); color: #000; padding: 12px 24px;
            border-radius: 30px; font-size: 22px; font-weight: bold; z-index: 60; display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="status-msg">座標をリセットしました</div>

        <div class="ui-header">
            <div id="score-display" class="info-box">SCORE: <span id="val-score">0</span></div>
            <div id="timer-display" class="info-box">TIME: <span id="val-timer">60</span></div>
        </div>

        <div id="command-container">
            <div id="command-text"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 45px; margin-bottom: 20px;">ステップ・マスター 60</h1>
            <button class="btn-start" onclick="initApp()">カメラを起動する</button>
            <div id="setup-guide" style="margin-top:25px; text-align:center; font-size: 18px; line-height: 1.6;">
                全身（足元まで）が映る位置に立ってください。
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display: none;">
            <h1 id="result-title" style="font-size: 65px; color: #ffcc00; margin-bottom: 10px;">TIME UP</h1>
            <div style="font-size: 50px; margin-bottom: 30px;">SCORE: <span id="final-score" style="color:#00ff00;">0</span></div>
            
            <div style="text-align:center;">
                <span style="color:#00ff00; font-size: 28px; font-weight: bold;">もう一度あそぶ</span><br><br>
                <span style="font-size: 20px; line-height: 1.8;">
                    「両手をあげてスクワット」してから<br>
                    直立に戻るとカウントダウン開始
                </span>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const commands = ["左前", "左横", "左後", "右前", "右横", "右後"];
        let currentTarget = "";
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let waitingForNeutral = false; 
        let isWaitingForReturn = false; 
        let isProcessingSuccess = false; 
        let timerInterval = null;
        let appInitialized = false;

        let baseAnkleDist = 0;
        let initialAnklePos = { l: {x:0, y:0}, r: {x:0, y:0} };
        let handsUpStartTime = null; 
        const EXIT_HOLD_TIME = 2000;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;

        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            synth.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.6; 
            synth.speak(uttr);
        }

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        function recordBasePosition(lm) {
            initialAnklePos.l = { x: lm[27].x, y: lm[27].y };
            initialAnklePos.r = { x: lm[28].x, y: lm[28].y };
            baseAnkleDist = getDistance(lm[27], lm[28]);
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);
            playSound(440, 0.1);
        }

        function triggerRealStart(lm) {
            recordBasePosition(lm);
            waitingForNeutral = false;
            isWaitingForReturn = false;
            gameActive = true;
            isProcessingSuccess = false;
            score = 0;
            timeLeft = 60;
            document.getElementById('val-score').innerText = score;
            document.getElementById('val-timer').innerText = timeLeft;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            
            playSound(880, 0.5);
            nextCommand();

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('val-timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function prepareStart() {
            if (gameActive || waitingForNeutral) return;
            waitingForNeutral = true;
            const cmdEl = document.getElementById('command-text');
            cmdEl.innerText = "姿勢を戻して";
            cmdEl.style.fontSize = "70px";
            cmdEl.style.color = "#fff";
            playSound(660, 0.2);
        }

        function nextCommand() {
            currentTarget = commands[Math.floor(Math.random() * commands.length)];
            const cmdEl = document.getElementById('command-text');
            cmdEl.innerText = currentTarget; 
            cmdEl.style.fontSize = "min(35vh, 60vw)";
            cmdEl.style.color = "#00ff00"; 

            let voiceText = currentTarget;
            if (currentTarget === "左後") voiceText = "ひだりうしろ";
            if (currentTarget === "右後") voiceText = "みぎうしろ";
            
            speak(voiceText);
        }

        function endGame(isAborted = false) {
            gameActive = false;
            waitingForNeutral = false;
            isWaitingForReturn = false;
            clearInterval(timerInterval);
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('result-screen').classList.add('preview-mode');
            document.getElementById('final-score').innerText = score;
            document.getElementById('command-text').innerText = ""; 
            speak(isAborted ? "中断します" : "終了です。お疲れ様でした");
        }

        function onResults(results) {
            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 【軽量化】ゲーム中以外のみカメラ映像を描画
            if (!gameActive) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                if (results.poseLandmarks) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.4)', lineWidth: 2});
                }
            } else {
                canvasCtx.fillStyle = '#000';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const nose = lm[0], lWrist = lm[15], rWrist = lm[16];
                const lAnkle = lm[27], rAnkle = lm[28], lFoot = lm[31], rFoot = lm[32];
                const lKnee = lm[25], rKnee = lm[26], lHip = lm[23], rHip = lm[24];

                const lHandUp = lWrist.y < nose.y;
                const rHandUp = rWrist.y < nose.y;
                const currentAnkleDist = getDistance(lAnkle, rAnkle);

                if (gameActive && ((lHandUp && !rHandUp) || (!lHandUp && rHandUp))) {
                    recordBasePosition(lm);
                }

                const lAngle = calculateAngle(lHip, lKnee, lAnkle);
                const rAngle = calculateAngle(rHip, rKnee, rAnkle);
                if (!gameActive && !waitingForNeutral && (lHandUp && rHandUp) && (lAngle < 140 && rAngle < 140)) {
                    prepareStart();
                }
                if (waitingForNeutral && !lHandUp && !rHandUp && lAngle > 165 && rAngle > 165) {
                    triggerRealStart(lm);
                }

                if (gameActive && lHandUp && rHandUp) {
                    if (handsUpStartTime === null) handsUpStartTime = Date.now();
                    else if (Date.now() - handsUpStartTime >= EXIT_HOLD_TIME) {
                        endGame(true);
                        handsUpStartTime = null;
                    }
                } else { handsUpStartTime = null; }

                if (gameActive) {
                    const cmdEl = document.getElementById('command-text');

                    if (isWaitingForReturn) {
                        const isBack = Math.abs(lAnkle.y - rAnkle.y) < 0.04 && currentAnkleDist < baseAnkleDist * 1.35;
                        if (isBack) {
                            isWaitingForReturn = false;
                            nextCommand();
                        }
                    } 
                    else if (!isProcessingSuccess) {
                        let success = false;
                        const marginNormal = 0.01;
                        const marginBack = 0.01;

                        switch(currentTarget) {
                            case "左前": if (lAnkle.y > rFoot.y + marginNormal) success = true; break;
                            case "左横": if (currentAnkleDist > baseAnkleDist * 1.8 && lAnkle.x > initialAnklePos.l.x + 0.04) success = true; break;
                            case "左後": if (lFoot.y < rAnkle.y + marginBack) success = true; break;
                            case "右前": if (rAnkle.y > lFoot.y + marginNormal) success = true; break;
                            case "右横": if (currentAnkleDist > baseAnkleDist * 1.8 && rAnkle.x < initialAnklePos.r.x - 0.04) success = true; break;
                            case "右後": if (rFoot.y < lAnkle.y + marginBack) success = true; break;
                        }

                        if (success) {
                            isProcessingSuccess = true; 
                            score++;
                            document.getElementById('val-score').innerText = score;
                            playSound(1200, 0.2);
                            
                            cmdEl.innerText = "OK"; // ！を削除
                            cmdEl.style.color = "#ff0000"; 
                            
                            setTimeout(() => {
                                isProcessingSuccess = false;
                                isWaitingForReturn = true;
                                cmdEl.innerText = "戻して"; // 指定されたテキストに変更し、！を削除
                                cmdEl.style.color = "#ffff00";
                                cmdEl.style.fontSize = "min(23vh, 38vw)";
                            }, 450);
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        function initApp() {
            if (appInitialized) return;
            audioCtx.resume();
            appInitialized = true;
            document.querySelector('.btn-start').style.display = 'none';
            camera.start().then(() => {
                document.getElementById('start-screen').classList.add('preview-mode');
            });
        }
    </script>
</body>
</html>
